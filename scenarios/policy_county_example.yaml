# 县级政策演练示例：执行链条短、人情与宗族因素更重，信息靠微信群与线下串门
name: policy_county_example
exercise_type: policy
player_brief: |
  拟在全县推进「农村宅基地确权数据入库」，由县政务数据局统筹；要求村级协理员入户核对；
  对争议地块先冻结再调解。配套宣传强调「不收费、不乱拆」，但上级考核有时间表。

policy_context:
  admin_level: county
  jurisdiction_name: 某农业县
  local_norms_brief: |
    乡镇干部与村两委威信高；外出务工人员春节集中返乡时舆情放大；宗族边界纠纷敏感，怕「上面一刀切」。
  media_environment_brief: |
    县级融媒体 + 抖音快手地方号为主；省级媒体偶尔下沉采访，标题易引发误读。

reference_cases_brief: ""

issuer:
  archetype: sme
  brand_equity: 0.5
  reputation_brief: ""
  supply_chain_position: ""

ticks: 8
random_seed: 7

initial:
  sentiment: 0.0
  economy_index: 0.48
  policy_support: 0.48
  rumor_level: 0.12
  unrest: 0.14

cohorts:
  - id: village_residents_core
    weight: 0.38
    class_layer: lower
    traits: { land_dependence: 0.9, legal_literacy: 0.35 }
  - id: migrant_workers_return
    weight: 0.22
    class_layer: middle
    traits: { land_dependence: 0.45, legal_literacy: 0.5 }
  - id: county_sme_bosses
    weight: 0.18
    class_layer: upper
    traits: { land_dependence: 0.25, legal_literacy: 0.55 }
  - id: teachers_medical_staff
    weight: 0.14
    class_layer: middle
    traits: { land_dependence: 0.4, legal_literacy: 0.65 }
  - id: county_staff_family
    weight: 0.08
    class_layer: upper
    traits: { land_dependence: 0.5, legal_literacy: 0.75 }

operational_finance:
  enabled: true
  fiscal_pool_billion: 12.0
  # 写意：经济景气越高，税收入库越多（十亿/tick × economy_index）
  fiscal_tax_inflow_from_economy_billion_per_tick: 0.018
  policy_spend_per_tick_billion: 0.06

institutions:
  - id: county_convergence_media
    name: 县级融媒体中心
    tier: small
    focus_brief: 本地转发链、标题是否克制、村干部群二次传播
  - id: prov_think_tank
    name: 省属智库课题组（内参渠道）
    tier: authority
    focus_brief: 政策评估抽样与上报口径，节奏偏慢

cooperations:
  - id: field_survey_vendor
    name: 第三方入户调研与问卷合同
    cost_million: 4.5
    partner_tier: small
    brief: 适合摸底舆情，但村级配合度参差
  - id: biglaw_opinion
    name: 律所行政复议/诉讼口径意见书
    cost_million: 120
    partner_tier: authority
    brief: 费用高、周期长，适合争议已外溢时选用

crisis_rules:
  - id: grassroots_pressure
    when_all:
      - metric: unrest
        gte: 0.22
    title: 基层稳控与舆情同时承压
    detail: |
      多个村群流传「强制上图」等说法，真实性待核查；上级考核节奏仍在。
      请指挥台拍板：沟通话术、资源下沉（人力/法律援助/调解预算）、是否暂缓部分入户节奏等——引擎不会代你自动化解。
    once: true

key_actors:
  - id: county_data_bureau
    role: 县政务数据局项目负责人
    goals: 按时入库、少上访、技术口径可解释
    persona: |
      夹在考核与乡镇现实之间；怕系统背锅，强调「数据只记录现状不做裁判」。
  - id: township_head
    role: 乡镇分管副镇长
    goals: 稳村、防群体性事件、完成指标
    persona: |
      熟悉几个大姓家族头面人物；知道哪几块地三十年前就有口头协议。
  - id: village_lawyer_like
    role: 驻村法律顾问（叙事）
    goals: 依法调解、留书面记录
    persona: |
      免费顾问时长有限；劝村民别信短视频里的「全国一条律」。

cohort_llm:
  enabled: false
