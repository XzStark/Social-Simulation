# 指标过线才暂停等你输入方案（阈值可按演练敏感度调整）
# 说明：无 API Key 的 Dry-Run 下 rumor 常被环境项缓慢压低，单用 rumor 可能迟迟不触发；故用「动荡/秩序摩擦 proxy」作主触发更稳。
crisis_rules:
  - id: public_friction_unrest_spike
    when_all:
      - metric: unrest
        gte: 0.15
    title: 公共场所摩擦叙事升温（秩序 proxy 触线）
    detail: |
      摩擦可能来自拍摄争议，也可能来自排队体验、门店话术、缺货激愤等；秩序与安全感叙事上升。
      请指挥台综合写：现场与渠道处置、公关边界、是否联动物业/场地方；若涉及拍摄与隐私一并说明，
      但不要假设问题只有隐私一类。
    once: true
  - id: camera_rumor_spike
    when_all:
      - metric: rumor_level
        gte: 0.14
    title: 谣言与误读链抬升（不限于偷拍叙事）
    detail: |
      谣言 proxy 抬升，既可能是隐私段子，也可能是「功能造假」「发货跑路」等未经核实说法。
      请指挥台写：事实核查与可演示证据、法务口径、针对性沟通与投放节奏；按实际爆发点作答，勿套模板只打隐私牌。
    once: true
  - id: trust_and_unrest_combo
    when_all:
      - metric: issuer_trust_proxy
        lte: 0.36
      - metric: unrest
        gte: 0.14
    title: 信任下滑且摩擦仍在高位
    detail: |
      主体信任 proxy 偏低且动荡仍高。请指挥台综合：是否暂缓新品话术、补救已承诺交付、
      一线投诉升级路径与发言人层级。
    once: true

