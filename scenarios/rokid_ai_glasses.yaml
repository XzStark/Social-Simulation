# Rokid（灵伴科技）消费级光波导 AI 眼镜 — 社会反响压力测试（公开信息整理，非投资建议）
# 说明：暂停由 crisis_rules 指标触发；risk_milestone_primary_calls 默认 0，不按「满几次 LLM」停。
name: rokid_ai_glasses_social
exercise_type: product

player_brief: |
  背景（公开信息归纳）：Rokid（杭州灵伴科技及相关品牌）长期布局 AR 与空间计算，消费级产品线强调
  「轻量光波导智能眼镜 + 端侧/云端 AI」：实时翻译与字幕、会议纪要、多厂商大模型接入、影像与 CV 能力等。
  光学方案在公开材料中常提及衍射光波导、Micro-LED 等路线；价位带随型号与渠道在数百至千元美元级区间波动。
  本轮假设：新品国内宣发主打「随身 AI 助理」与线下体验店打卡；短视频与数码 KOL 密集测评。
  【对智能体】以下仅为示例摩擦面，**不得**把整场讨论收窄为只谈这些；须结合场上指标与人群状态**自行发现**
  用户与渠道会真实抱怨的问题，并允许其**反映给媒体**形成报道线索：例如交付/缺货与心理落差、佩戴与续航发热、
  固件与 AI 功能翻车、售后退换与客服话术、价格与竞品对比、内容付费与账号区、职场/课堂是否禁戴、
  商场物业与现场纠纷、维修备件与渠道压货、隐私与拍摄仅为其中一类而非全部。

